{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
  html, body {height: 100vh;overflow: hidden;}
  .sidebar {height: 100vh;background: #eceef1;color: white;padding-top: 10px;position: relative;  }
  .logo {margin-left: 30px; margin-top: 30px; margin-bottom: 30px;margin-right: 30px;}
  .sidebar a {
  display: flex;              
  align-items: center;       
  justify-content: space-between; 
  color: black;
  padding: 12px 20px;
  text-decoration: none;
  white-space: nowrap;       }
  .sidebar a:hover {background: #eb7150;}
  .sidebar a i {margin-left: 10px;}
  .topbar {background: white;padding: 15px;border-bottom: 1px solid #ddd;}
  .card-box {background: white;padding: 10px; border-radius: 10px; margin-bottom: 10px;text-align: center;box-shadow: 0 2px 5px rgba(0,0,0,0.1);}
  .sidebar.collapsed {width: 90px !important;}
  .sidebar.collapsed a {font-size: 0;}
  .sidebar.collapsed a i {font-size: 18px;}
  .rotate { transform: rotate(180deg); display: inline-block;}
  .main-content {width: calc(100% - 180px) !important;transition: 0.3s;}
  .main-content.expanded { width: calc(100% - 90px) !important;}
  .sidebar {width: 180px !important;}
  .toggle-btn {position: absolute;
      top: 15px;
      right: 0px;
      background: #e9e5e4;
      color: white;
      width: 25px;
      height: 25px;
      text-align: center;
      line-height: 25px;
      border-radius: 0;
      cursor: pointer;
      font-size: 20px;}
  .sidebar a {
  display: flex;              
  align-items: center;       
  justify-content: space-between; 
  color: black;
  padding: 12px 20px;
  text-decoration: none;
  white-space: nowrap;}
  

  </style>
</head>

<body>
<div class="container-fluid">
  <div class="row">

    <div class="col-sm-3 col-md-2 sidebar">

    
      <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-chevron-left"></i>
      </div>

      <div class="logo">
        <a href="{% url 'home' %}">
          <img src="{% static 'images/homelogo.jpg' %}" class="img-responsive" />
        </a>
      </div>

      <a href="{% url 'home' %}">Home <i class="bi bi-house"></i></a>
      <a href="{% url 'profile' %}">Profile <i class="bi bi-person-fill"></i></a>
      <a href="{% url 'settings' %}">Settings <i class="bi bi-gear-fill"></i></a>
      <a href="{% url 'logout' %}">Logout <i class="bi bi-box-arrow-right"></i></a>

    </div>

   <div class="col-sm-9 col-md-10 main-content">
      {% block content %}
      {% endblock %}
    </div>

  </div>
</div>


<script>
function toggleSidebar() {
  let sidebar = document.querySelector(".sidebar");
  let arrow = document.getElementById("arrow");
  let content = document.querySelector(".main-content");

  sidebar.classList.toggle("collapsed");
  arrow.classList.toggle("rotate");
  content.classList.toggle("expanded");  
}
</script>

</body>
</html>
