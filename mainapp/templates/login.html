{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: #f5f7fb;
        font-family: Arial, sans-serif;
      }
      .inner-box {
        width: 85%;
        margin: 20px auto 0;
      }
      
      .left-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px;
      }
      .right-section {
        text-align: center;
        padding: 20px;
      }
      
      .form-control {
        width: 100%;
      }
      .heading {
        font-size: 50px;
        margin-bottom: 40px;
        line-height: 1.8cm;
        margin-top: 30px;
      }
      .form-control {
  border-radius: 10px;
  height: 50px;
  margin-bottom: 15px;
  width: 100%; 
  max-width: 400px;
}
      .form-control::placeholder {
        color: #555;
      }
      .forgot {
        font-size: 12px;
        color: #ff6b3d;
        margin-right: 260px;
      }
      .logo {
        width: 180px;
        height: auto;
        margin-top: 50px;
        margin-bottom: 10px;
        display: block;
      }
      .btn-login {
        margin-top: 20px;
        border-radius: 50px;
        padding: 8px 20px;
        background-color: #e0e0e0;
        border: none;
        color: #888;
      }
      .carousel-inner {
  width: 100%;
  max-width: 600px;
  aspect-ratio: 1 / 1; 
  border-radius: 30px;
  overflow: hidden;
  margin: auto;
}
      .right-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }
      .carousel-inner .item {
        height: 100%;
      }
      @media (max-width: 768px) {
        body {
          overflow: auto;
        }
      }
.carousel-fade .carousel-inner .item {
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}
.carousel-fade .carousel-inner .active {
  opacity: 1;
}
.carousel-fade .carousel-inner .next,
.carousel-fade .carousel-inner .prev {
  left: 30%;
  transform: none;
}
    </style>
  </head>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <body>
    <div class="main-wrapper">
      <div class="main-container">
        <div class="container inner-box">
          <div class="row">
            <div class="col-md-6 left-section">
              <div class="logo">
                <img src="{% static 'images/loginlogo.png' %}" class="img-responsive" />
              </div>
              <div class="heading">
                Know your happy,<br />
                health side.
              </div>
              <form action="" method="post" >
                {% csrf_token %}
                <input type="text" class="form-control" placeholder="Username" name="username" />
                <input type="password" class="form-control" placeholder="Password" name="password" />
                <div class="clearfix">
                  <a href="{% url 'register' %}" class="create pull-left">Create an account?</a>
                  <a href="#" class="forgot pull-right">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-login">Sign in</button>
              </form>
            </div>
            <div class="col-md-6 right-section">
              <div id="imageCarousel" class="carousel slide carousel-fade" data-ride="carousel" data-interval="2000">
                <div class="carousel-inner">
                  <div class="item active">
                    <img src="{% static 'images/loginright1.png' %}" class="right-image" />
                  </div>
                  <div class="item">
                    <img src="{% static 'images/logoright2.png' %}" class="right-image" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
