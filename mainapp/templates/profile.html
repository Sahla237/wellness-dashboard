{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div style="background:white; padding:30px; margin-top:30px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
    <h2>Profile Page</h2>
    <hr>
    <p><strong>Name:</strong> {{ user.username }}</p>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Role:</strong> User</p>
    <a href="{% url 'home' %}" class="btn btn-primary">Back</a>
  </div>
</div>
{% endblock %}
