{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css" />

    <style>
      body {
        background-color: #f5f7fb;
        font-family: Arial, sans-serif;
      }
      
      .main-wrapper {
        height: 100vh;
        display: table;
        width: 100%;
      }
      
      .main-container {
        display: table-cell;
        vertical-align: middle;
      }
      
      .inner-box {
        width: 85%;
        margin: 60px auto 0;
      }
      
      .left-section {
        padding: 20px;
      }
      .heading {
        font-size: 50px;
        margin-bottom: 40px;
        line-height: 1.8cm;
        margin-top: 60px;
      }
      .form-control {
        border-radius: 10px;
        height: 50px;
        margin-bottom: 15px;
        width: 60%;
        background-color: white;
        color: black;
        border: none;
      }
      .form-control::placeholder {
  color: #555;
}
      .forgot {
        font-size: 12px;
        color: #ff6b3d;
        margin-right: 260px;
      }
      .logo {
        width: 180px;
        height: auto;
        margin-top: 50px;
        margin-bottom: 10px;
        display: block;
      }
      
      .btn-login {
        margin-top: 20px;
        border-radius: 50px;
        padding: 8px 20px;
        background-color: #e0e0e0;
        border: none;
        color: #888;
      }
      

      .right-image {
        max-width: 550px;
        width: 100%;
        display: block;
        margin-left: 90px;
        margin-bottom: 100px;
        border-radius: 50px;
      }
      
      @media (max-width: 768px) {
        .form-control {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="main-wrapper">
      <div class="main-container">
        <div class="container inner-box">
          <div class="row">
       
            <div class="col-md-6 left-section">
              <div class="logo">
                <img src="{% static 'images/loginlogo.png' %}" class="img-responsive" />
              </div>

              <div class="heading">
                Know your happy,<br />
                health side.
              </div>
                <form method="post">
  {% csrf_token %}

  <input type="text" name="username" placeholder="Username" class="form-control">
  <input type="password" name="password" placeholder="Password" class="form-control">
  <input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control">

  <button type="submit" class="btn btn-login">Sign up</button>
</form>
            </div>
            {% for message in messages %}
                <script>alert('{{message}}');
                </script>
                {% endfor %}

           
            <div class="col-md-6 text-center">
              <img src="{% static 'images/loginright.png' %}" class="img-responsive center-block right-image" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
